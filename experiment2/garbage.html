<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾分类问答</title>
    <link rel="stylesheet" href="garbage.css">
</head>
<body>
    <div class="garbage-app">
        <h1>垃圾分类问答小程序</h1>
        
        <div class="category-info">
            <h2>垃圾分类类别：</h2>
            <p>1.可回收垃圾; 2.有害垃圾; 3.厨余垃圾; 4.其它垃圾</p>
        </div>
        
        <div class="question-area">
            <div id="garbage-item"></div>
        </div>
        
        <div class="control-buttons">
            <button id="start-btn">开始</button>
            <button id="stop-btn">停止</button>
            <button id="result-btn">结果</button>
        </div>
        
        <div class="result-area">
            <div id="result"></div>
        </div>
    </div>
    
    <script src="garbage.js"></script>
</body>
</html>
